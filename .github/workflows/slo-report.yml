name: slo-report

on:
  workflow_run:
    workflows: ["SLO"]
    types:
      - completed

jobs:
  publish-slo-report:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    name: Publish YDB SLO Report
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Publish YDB SLO Report
        uses: ydb-platform/ydb-slo-action/report@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_run_id: ${{ github.event.workflow_run.id }}

  remove-slo-label:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    name: Remove SLO Label
    permissions:
      pull-requests: write
    steps:
      - name: Remove SLO label from PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRS: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          REPO: ${{ github.event.workflow_run.repository.full_name }}
        run: |
          set -euo pipefail
          PR=$(jq -r '.[0].number' <<<"$PRS")
          gh pr edit "$PR" --repo "$REPO" --remove-label SLO
